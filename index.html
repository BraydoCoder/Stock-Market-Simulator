<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StockPilot — Take the controls. Trade without risk.</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✈</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body class="bg-bg text-text-primary font-body min-h-screen antialiased">
  <!-- Narrow-screen banner (PRD §19.7): shown on screens < 1024px -->
  <div id="narrow-banner" class="hidden fixed inset-0 z-[999] bg-bg flex items-center justify-center p-6">
    <div class="text-center max-w-sm">
      <div class="text-4xl mb-4">✈</div>
      <h1 class="font-display font-bold text-xl text-accent-primary mb-2">STOCKPILOT</h1>
      <p class="text-text-secondary text-sm leading-relaxed">
        StockPilot works best on a desktop browser.<br>Some features may not display correctly on smaller screens.
      </p>
      <button id="narrow-dismiss"
        onclick="document.getElementById('narrow-banner').style.display='none';sessionStorage.setItem('narrow-dismissed','1')"
        class="mt-6 px-4 py-2 rounded-lg border border-border text-xs text-text-muted hover:text-text-primary transition-colors">
        Continue anyway
      </button>
    </div>
  </div>

  <div id="app">
    <div id="navbar"></div>
    <main id="main-content" class="pt-14"></main>
    <div id="modal-container"></div>
    <div id="toast-container" class="fixed top-4 right-4 z-[500] flex flex-col gap-2 pointer-events-none"></div>
  </div>
  <script>
    window.addEventListener('error', function(e) {
      document.body.innerHTML = '<div style="position:fixed;inset:0;background:#111;color:#f00;font-family:monospace;padding:2rem;overflow:auto;z-index:9999"><h2>JS Error</h2><pre>' + (e.error ? e.error.stack : e.message + ' ' + e.filename + ':' + e.lineno) + '</pre></div>'
    })
    window.addEventListener('unhandledrejection', function(e) {
      document.body.innerHTML = '<div style="position:fixed;inset:0;background:#111;color:#f00;font-family:monospace;padding:2rem;overflow:auto;z-index:9999"><h2>Unhandled Promise Rejection</h2><pre>' + (e.reason?.stack || e.reason) + '</pre></div>'
    })
  </script>
  <script type="module" src="/src/main.js"></script>
  <script defer src="/_vercel/speed-insights/script.js"></script>
  <script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
